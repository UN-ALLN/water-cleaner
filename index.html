<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Cleaner — charity: water</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;1,700&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone">

  <!-- TITLE SCREEN -->
  <div class="screen active" id="titleScreen">
    <div class="title-group">
      <h1 class="title-row">
        <span>Water<br>Cleaner</span>
        <svg class="title-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C9 6.5 5 11.2 5 15a7 7 0 0 0 14 0c0-3.8-4-8.5-7-13z"/></svg>
      </h1>
      <div class="difficulty-row" id="difficultyRow">
        <button class="difficulty-btn" data-difficulty="easy">Easy</button>
        <button class="difficulty-btn active" data-difficulty="normal">Normal</button>
        <button class="difficulty-btn" data-difficulty="hard">Hard</button>
      </div>
      <button class="menu-btn" id="playBtn">Play</button>
      <button class="menu-btn" id="levelsBtn">Levels</button>
    </div>
  </div>

  <!-- LEVELS SCREEN -->
  <div class="screen" id="levelsScreen">
    <div class="screen-content">
      <h2>Levels</h2>
      <div class="level-grid" id="levelGrid"></div>
    </div>
    <button class="home-btn" id="backFromLevels" aria-label="Back to home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"/></svg>
      Back
    </button>
  </div>

  <!-- LEVEL PLAY SCREEN -->
  <div class="screen" id="levelScreen">
    <div class="screen-content">
      <h2 id="levelTitle">Level 1</h2>
      <div class="difficulty-badge" id="difficultyBadge">Normal</div>
      <div class="stats-row">
        <div>Score <span class="num" id="scoreVal">0</span></div>
        <div>Sorted <span class="num" id="progressVal">0/6</span></div>
      </div>
      <div class="water-circle" id="waterCircle">
        <div class="toast" id="toast"></div>
      </div>
      <div class="milestone-banner" id="milestoneBanner"></div>
      <div class="timer-text" id="timeVal">10s</div>
      <div class="buckets-row" id="bucketsRow"></div>
    </div>
    <button class="home-btn" id="backFromLevel" aria-label="Back to home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"/></svg>
      Home
    </button>

    <div class="countdown-overlay" id="countdownOverlay">
      <div class="countdown-number" id="countdownNumber">3</div>
      <div class="countdown-label">Get ready to sort...</div>
    </div>
  </div>

  <!-- END SCREEN -->
  <div class="screen" id="endScreen">
    <div class="screen-content">
      <h2 id="endTitle">Level Clear</h2>
      <p id="endSubtitle">All pollutants sorted in time.</p>
      <div class="score-big" id="endScore">0</div>
      <button class="primary-btn" id="nextBtn">Next Level</button>
      <button class="text-btn" id="retryBtn">Try Again</button>
    </div>
    <button class="home-btn" id="homeFromEnd" aria-label="Back to home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"/></svg>
      Back
    </button>
  </div>

  <!-- FOOTER: charity: water brand + links, shown on every screen -->
  <footer class="brand-mark">
    <a href="https://www.charitywater.org" target="_blank" rel="noopener noreferrer">
      <img src="assets/cw_horizontal_white.jpg" alt="charity: water">
    </a>
    <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer" class="donate-btn">Donate</a>
  </footer>

</div>

<script src="script.js"></script>

</body>
</html>
